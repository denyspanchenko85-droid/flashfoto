name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      # Перейменовуємо файл перед відправкою
      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/FlashFoto.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashFoto-APK
          path: app/build/outputs/apk/debug/FlashFoto.apk
